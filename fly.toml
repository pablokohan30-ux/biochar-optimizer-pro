# Biochar Optimizer Pro — Fly.io app config
#
# This config assumes:
#   - app name: `biochar-optimizer-pro` (change with `fly apps create <name>`
#     before first deploy if you want a different one)
#   - region: gru (São Paulo) — only South America region Fly offers; closest
#     to Bogotá / Carbon Forum 2026
#   - persistent volume `biochar_data` mounted at /app/data so the SQLite
#     database survives deploys
#
# Single machine for the launch (auto-stop when idle, auto-start on request).
# Scale up later with `fly scale count 2 --region gru` once we add Postgres.

app = "biochar-optimizer-pro"
primary_region = "gru"
kill_signal = "SIGINT"
kill_timeout = "5s"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"
  NODE_ENV = "production"

# Persistent volume for the SQLite database.
# Create once: `fly volumes create biochar_data --region gru --size 1`
[mounts]
  source = "biochar_data"
  destination = "/app/data"
  initial_size = "1gb"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
