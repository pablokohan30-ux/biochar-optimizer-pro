name: Deploy to Fly.io

# Auto-deploy on every push to main. Manual trigger also available from
# the Actions tab (workflow_dispatch). Skip CI with [skip ci] in the
# commit message (e.g. for docs-only changes).

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only one deploy at a time per branch — if you push twice quickly, the
# second one waits for the first to finish (or cancels it).
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      # Retry up to 3 times to survive transient Fly.io host issues (e.g.
      # `governor policy blocked start: mem_overcommit_exceeded` when the
      # physical host is saturated when we try to boot a new VM). Backoff
      # 30s then 60s between attempts — total worst-case extra wait is
      # ~1.5 min if the first two attempts fail. The build stage is cached
      # after the first attempt so subsequent tries only re-run the deploy
      # step, which is where the flake happens.
      - name: Deploy (rolling, build remote on Fly, with retries)
        run: |
          set -u
          for attempt in 1 2 3; do
            echo "::group::Attempt $attempt of 3"
            if flyctl deploy --remote-only --strategy rolling; then
              echo "::endgroup::"
              echo "Deploy succeeded on attempt $attempt"
              exit 0
            fi
            echo "::endgroup::"
            if [ "$attempt" -lt 3 ]; then
              sleep_time=$((attempt * 30))
              echo "Attempt $attempt failed. Sleeping ${sleep_time}s before retry..."
              sleep "$sleep_time"
            fi
          done
          echo "All 3 attempts failed"
          exit 1
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
