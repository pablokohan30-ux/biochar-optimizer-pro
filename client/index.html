<!doctype html>
<html lang="en" translate="no">

  <head>
    <meta charset="UTF-8" />
    <!-- Favicon stack: SVG for modern browsers, PNG fallbacks, Apple touch icon for iOS bookmarks, PWA manifest for Android. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#22c55e" />
    <meta name="apple-mobile-web-app-title" content="Biochar Pro" />
    <meta name="application-name" content="Biochar Optimizer Pro" />
    <meta name="google" content="notranslate" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <meta name="description" content="Digital infrastructure for biochar carbon projects. Simulate pyrolysis, score your project against Puro.earth, Isometric, EBC and IBI, and export audit-ready submission packages. Free to try." />
    <link rel="canonical" href="https://biocharpro.io" />
    <!-- OpenGraph (LinkedIn, X, WhatsApp, Slack previews) — MUST be PNG/JPG.
         Many social platforms don't render SVG previews, so we serve a rendered
         PNG for social cards even though the rest of the site uses SVG. -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://biocharpro.io" />
    <meta property="og:site_name" content="Biochar Optimizer Pro" />
    <meta property="og:title" content="Biochar Optimizer Pro — Digital infrastructure for biochar projects" />
    <meta property="og:description" content="Simulate pyrolysis, score your project against every major methodology (Puro.earth · Isometric · EBC · IBI), and export submission-ready packages. Free to try." />
    <meta property="og:image" content="https://biocharpro.io/og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Biochar Optimizer Pro — pyrolysis simulator and certification readiness platform" />
    <meta property="og:locale" content="es_AR" />
    <meta property="og:locale:alternate" content="en_US" />
    <!-- Twitter/X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://biocharpro.io/og-image.png" />
    <meta name="twitter:title" content="Biochar Optimizer Pro — Digital infrastructure for biochar projects" />
    <meta name="twitter:description" content="Simulate pyrolysis, score against Puro.earth · Isometric · EBC · IBI, export submission packages. Free." />
    <title>Biochar Optimizer Pro — Digital infrastructure for biochar carbon projects</title>
    <!-- Structured data (Schema.org) — helps search engines understand what we are.
         SoftwareApplication schema tells Google this is a SaaS product; Organization
         schema establishes the brand. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://biocharpro.io/#org",
          "name": "Biochar Optimizer Pro",
          "url": "https://biocharpro.io",
          "logo": "https://biocharpro.io/og-image.png",
          "description": "Digital infrastructure for biochar carbon projects — pre-certification preparation for Puro.earth, Isometric, EBC, IBI and more.",
          "sameAs": []
        },
        {
          "@type": "SoftwareApplication",
          "name": "Biochar Optimizer Pro",
          "applicationCategory": "BusinessApplication",
          "operatingSystem": "Web",
          "url": "https://biocharpro.io",
          "description": "Simulate biochar pyrolysis, score your project against every major methodology (Puro.earth, Isometric, EBC, IBI), and export audit-ready submission packages.",
          "offers": [
            { "@type": "Offer", "name": "Free", "price": "0", "priceCurrency": "USD" },
            { "@type": "Offer", "name": "Analyst", "price": "299", "priceCurrency": "USD" },
            { "@type": "Offer", "name": "Developer", "price": "499", "priceCurrency": "USD" },
            { "@type": "Offer", "name": "Engineer", "price": "799", "priceCurrency": "USD" }
          ],
          "publisher": { "@id": "https://biocharpro.io/#org" }
        }
      ]
    }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <style>
      body { font-family: 'Inter', sans-serif; }
      .font-mono { font-family: 'JetBrains Mono', monospace; }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>

</html>
