<!doctype html>
<html lang="es" translate="no">

  <head>
    <meta charset="UTF-8" />
    <!-- Favicon stack: SVG for modern browsers, PNG fallbacks, Apple touch icon for iOS bookmarks, PWA manifest for Android. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#22c55e" />
    <meta name="apple-mobile-web-app-title" content="BiocharPro" />
    <meta name="application-name" content="BiocharPro" />
    <meta name="google" content="notranslate" />
    <!-- Removed maximum-scale=1: blocked pinch-zoom on iOS and triggered odd
         layout shifts on some Android browsers. Standard responsive viewport now. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Convierte tu proyecto de biochar en un dossier listo para certificar y vender. Simula pirólisis, compara metodologías y organiza evidencia lista para auditoría." />
    <link rel="canonical" href="https://biocharpro.io" />
    <!-- OpenGraph (LinkedIn, X, WhatsApp, Slack previews) — MUST be PNG/JPG.
         Many social platforms don't render SVG previews, so we serve a rendered
         PNG for social cards even though the rest of the site uses SVG. -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://biocharpro.io" />
    <meta property="og:site_name" content="BiocharPro" />
    <meta property="og:title" content="BiocharPro — Dossier listo para certificar y vender" />
    <meta property="og:description" content="Simula pirólisis, compara metodologías y organiza la evidencia que necesitas para avanzar con certificadores y buyers serios." />
    <meta property="og:image" content="https://biocharpro.io/og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="BiocharPro — simulador de pirólisis y plataforma de preparación para certificación" />
    <meta property="og:locale" content="es_AR" />
    <meta property="og:locale:alternate" content="en_US" />
    <!-- Twitter/X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://biocharpro.io/og-image.png" />
    <meta name="twitter:title" content="BiocharPro — Dossier listo para certificar y vender" />
    <meta name="twitter:description" content="Simula pirólisis, compara metodologías y organiza evidencia lista para auditoría." />
    <title>BiocharPro — Dossier listo para certificar y vender</title>
    <!-- Structured data (Schema.org) — helps search engines understand what we are.
         SoftwareApplication schema tells Google this is a SaaS product; Organization
         schema establishes the brand. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://biocharpro.io/#org",
          "name": "BiocharPro",
          "url": "https://biocharpro.io",
          "logo": "https://biocharpro.io/og-image.png",
          "description": "Plataforma para convertir proyectos de biochar en dossiers listos para certificación, auditoría y conversaciones con buyers.",
          "sameAs": []
        },
        {
          "@type": "SoftwareApplication",
          "name": "BiocharPro",
          "applicationCategory": "BusinessApplication",
          "operatingSystem": "Web",
          "url": "https://biocharpro.io",
          "description": "Simula pirólisis de biochar, compara metodologías y exporta documentación lista para auditoría y certificación.",
          "offers": [
            { "@type": "Offer", "name": "Free", "price": "0", "priceCurrency": "USD" },
            { "@type": "Offer", "name": "Analyst", "price": "299", "priceCurrency": "USD" },
            { "@type": "Offer", "name": "Developer", "price": "499", "priceCurrency": "USD" },
            { "@type": "Offer", "name": "Engineer", "price": "799", "priceCurrency": "USD" }
          ],
          "publisher": { "@id": "https://biocharpro.io/#org" }
        }
      ]
    }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <style>
      body { font-family: 'Inter', sans-serif; }
      .font-mono { font-family: 'JetBrains Mono', monospace; }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>

</html>
